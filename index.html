<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>وثائقي الرقمية</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#FFFFFF;--bg2:#F8F9FB;--bg3:#F0F2F5;
  --ink:#0D1117;--ink2:#374151;--muted:#9CA3AF;
  --border:rgba(0,0,0,0.06);--border2:rgba(0,0,0,0.10);
  --green:#16A34A;--green2:#15803D;--green3:#DCFCE7;
  --greenA:rgba(22,163,74,0.12);
  --red:#DC2626;--redA:rgba(220,38,38,0.10);
  --amber:#D97706;--amberA:rgba(217,119,6,0.10);
  --blue:#2563EB;--blueA:rgba(37,99,235,0.10);
}
body{font-family:'Tajawal',sans-serif;background:#0D1117;direction:rtl;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px 16px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scan{0%{top:6%}50%{top:84%}100%{top:6%}}
.fu{animation:fadeUp .3s ease both;}
.fi{animation:fadeIn .22s ease both;}
.scroll{overflow-y:auto;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

  },

    blueprint:[{l:'المساحة',v:'42.0 م²'},{l:'الارتفاع',v:'3.5 م'},{l:'النوافذ',v:'3 نوافذ كبيرة'},{l:'السقف',v:'جبسية مركزية'}],
    specs:[{icon:'🎨',label:'كود الدهان',val:'Jotun 2231 Pearl'},{icon:'🪵',label:'الأرضية',val:'بورسلين 120×120'},{icon:'🏛️',label:'الأسقف',val:'جبس مع إضاءة'},{icon:'💡',label:'الإضاءة',val:'Strip 3000K'}],

    specs:[{icon:'🎨',label:'كود الدهان',val:'Jotun 1024 Timeless'},{icon:'🪵',label:'الأرضية',val:'رخام بورتيني'}],

    blueprint:[{l:'المساحة',v:'22.8 م²'},{l:'الارتفاع',v:'2.8 م'},{l:'السعة',v:'سيارتين'},{l:'الباب',v:'بوابة كهربائية'}],

const REPLIES={
  'ضمان':{text:'عندك 9 ضمانات.\n⚠️ ضمان التكييف ينتهي خلال 12 يوم\n⚠️ ضمان الثلاجة ينتهي خلال 23 يوم',files:[{icon:'❄️',n:'ضمان التكييف'},{icon:'🍽️',n:'ضمان الثلاجة'}]},

  'كم':{text:'47 وثيقة موزعة على 8 غرف.',files:[]},

const getReply=q=>{const k=Object.keys(REPLIES).find(k=>q.includes(k));return k?REPLIES[k]:{text:'لم أجد نتيجة. حاول ذكر نوع الملف.',files:[]};};

function SBar({light}){
  const c=light?'#fff':'var(--ink)';
  return(
    <div style={{height:44,display:'flex',alignItems:'flex-end',justifyContent:'space-between',padding:'0 22px 8px',flexShrink:0,color:c}}>
      <span style={{fontSize:12,fontWeight:700}}>9:41</span>
      <div style={{display:'flex',alignItems:'center',gap:5}}>
        <svg width="13" height="10" viewBox="0 0 13 10" fill={c} opacity=".85">
          <rect x="0" y="3" width="2" height="7" rx="1" opacity=".35"/>
          <rect x="3.5" y="2" width="2" height="8" rx="1" opacity=".6"/>
          <rect x="7" y="1" width="2" height="9" rx="1" opacity=".8"/>
          <rect x="10.5" y="0" width="2" height="10" rx="1"/>
        </svg>
        <div style={{width:20,height:10,border:`1.5px solid ${light?'rgba(255,255,255,.4)':'rgba(0,0,0,.2)'}`,borderRadius:3,padding:'1.5px 2px',display:'flex'}}>
          <div style={{width:'70%',background:c,borderRadius:1.5}}/>
        </div>
      </div>
    </div>
  );
}

function Nav({active,onTab}){
  const tabs=[{id:'home',icon:'⊞',label:'الرئيسية'},{id:'map',icon:'⌂',label:'المنزل'},{id:'profile',icon:'◯',label:'حسابي'}];
  return(
    <div style={{background:'var(--bg)',borderTop:'1px solid var(--border)',display:'flex',padding:'8px 6px 14px',flexShrink:0}}>
      {tabs.map(t=>{
        const on=active===t.id;
        return(
          <div key={t.id} onClick={()=>onTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,cursor:'pointer'}}>
            <div style={{width:32,height:32,borderRadius:10,background:on?'var(--green3)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s',fontSize:on?18:17,color:on?'var(--green2)':'var(--muted)'}}>
              {t.icon}
            </div>
            <span style={{fontSize:10,fontWeight:on?700:400,color:on?'var(--green2)':'var(--muted)',transition:'all .2s'}}>{t.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function UploadOverlay({onClose}){
  const[stage,setStage]=useState('pick');
  const[fields,setFields]=useState({type:'ضمان',room:'المطبخ',device:'ثلاجة سامسونج',date:'مايو 2026'});
  const[editing,setEditing]=useState(null);
  const FL={type:'النوع',room:'الغرفة',device:'الجهاز',date:'تاريخ الانتهاء'};
  const FO={type:['ضمان','رسمي','مخطط','تشطيبات'],room:['المطبخ','غرفة النوم','الصالة','الحمام'],device:['ثلاجة سامسونج','تكييف','غسالة','ميكروويف'],date:['يناير 2026','مارس 2026','مايو 2026','ديسمبر 2026']};
  useEffect(()=>{if(stage==='scan'){const t=setTimeout(()=>setStage('suggest'),1800);return()=>clearTimeout(t);}},[stage]);
  return(
    <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.5)',backdropFilter:'blur(8px)',zIndex:50,display:'flex',alignItems:'flex-end'}}>
      <div style={{width:'100%',background:'var(--bg)',borderRadius:'24px 24px 0 0',padding:'16px 18px 32px',animation:'slideUp .3s ease both'}}>
        <div style={{width:36,height:4,background:'var(--bg3)',borderRadius:2,margin:'0 auto 18px'}}/>
        {stage==='pick'&&<>
          <p style={{fontWeight:800,fontSize:16,color:'var(--ink)',textAlign:'center',marginBottom:18}}>ارفع وثيقة</p>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <button onClick={()=>setStage('scan')} style={{padding:'15px',background:'var(--green)',color:'#fff',border:'none',borderRadius:14,fontFamily:'Tajawal,sans-serif',fontWeight:700,fontSize:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              <span>📷</span> تصوير وثيقة
            </button>
            <button onClick={()=>setStage('scan')} style={{padding:'15px',background:'var(--bg2)',color:'var(--ink)',border:'1px solid var(--border)',borderRadius:14,fontFamily:'Tajawal,sans-serif',fontWeight:600,fontSize:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              <span>📁</span> اختر من الملفات
            </button>
            <button onClick={onClose} style={{padding:'11px',background:'none',color:'var(--muted)',border:'none',fontFamily:'Tajawal,sans-serif',fontSize:14,cursor:'pointer'}}>إلغاء</button>
          </div>
        </>}
        {stage==='scan'&&(
          <div style={{textAlign:'center',padding:'10px 0 20px'}}>
            <div style={{width:180,height:220,background:'#0D1117',borderRadius:16,margin:'0 auto 18px',position:'relative',overflow:'hidden',border:'1.5px solid rgba(22,163,74,.5)'}}>
              <div style={{position:'absolute',inset:14,background:'#1a2235',borderRadius:8,opacity:.5}}/>
              {[['top','right'],['top','left'],['bottom','right'],['bottom','left']].map(([v,h],i)=>(
                <div key={i} style={{position:'absolute',...(v==='top'?{top:7}:{bottom:7}),...(h==='right'?{right:7}:{left:7}),width:16,height:16,borderTop:v==='top'?'2px solid #22C55E':'none',borderBottom:v==='bottom'?'2px solid #22C55E':'none',borderRight:h==='right'?'2px solid #22C55E':'none',borderLeft:h==='left'?'2px solid #22C55E':'none'}}/>
              ))}
              <div style={{position:'absolute',left:7,right:7,height:1.5,background:'linear-gradient(90deg,transparent,#22C55E,transparent)',animation:'scan 1.6s ease-in-out infinite',boxShadow:'0 0 8px #22C55E'}}/>
            </div>
            <p style={{fontWeight:700,fontSize:15,color:'var(--ink)',marginBottom:5}}>المساعد يحلل الوثيقة...</p>
            <p style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>يقرأ البيانات الوصفية فقط</p>
            <div style={{display:'flex',gap:5,justifyContent:'center'}}>
              {[0,1,2].map(d=><div key={d} style={{width:7,height:7,borderRadius:'50%',background:'var(--green)',animation:'pulse 1.2s infinite',animationDelay:`${d*.2}s`}}/>)}
            </div>
          </div>
        )}
        {stage==='suggest'&&<>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
            <div style={{width:38,height:38,background:'var(--green)',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🤖</div>
            <div>
              <p style={{fontWeight:800,fontSize:14,color:'var(--ink)'}}>اقتراح التصنيف</p>
              <p style={{fontSize:11,color:'var(--muted)'}}>راجع وأكّد أو عدّل</p>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:9,background:'var(--bg2)',borderRadius:12,padding:'10px 12px',marginBottom:12,border:'1px solid var(--border)'}}>
            <div style={{width:34,height:40,background:'var(--bg)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0,border:'1px solid var(--border)'}}>📄</div>
            <div>
              <p style={{fontWeight:600,fontSize:12,color:'var(--ink)'}}>ضمان_ثلاجة_سامسونج.pdf</p>
              <p style={{fontSize:11,color:'var(--muted)',marginTop:2}}>2.1 MB · PDF</p>
            </div>
          </div>
          <div style={{background:'var(--bg2)',borderRadius:14,overflow:'hidden',marginBottom:14,border:'1px solid var(--border)'}}>
            {Object.entries(fields).map(([k,v],i,arr)=>(
              <div key={k}>
                <div onClick={()=>setEditing(editing===k?null:k)} style={{padding:'12px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer'}}>
                  <span style={{fontSize:12,color:'var(--muted)',fontWeight:500}}>{FL[k]}</span>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontWeight:700,fontSize:13,color:'var(--ink)'}}>{v}</span>
                    <span style={{fontSize:10,color:'var(--muted)'}}>✏</span>
                  </div>
                </div>
                {editing===k&&(
                  <div style={{padding:'0 12px 10px',display:'flex',gap:6,flexWrap:'wrap'}}>
                    {FO[k].map(opt=>(
                      <button key={opt} onClick={()=>{setFields(f=>({...f,[k]:opt}));setEditing(null);}} style={{padding:'5px 12px',borderRadius:20,background:opt===v?'var(--green)':'var(--bg)',color:opt===v?'#fff':'var(--ink)',border:`1px solid ${opt===v?'var(--green)':'var(--border)'}`,cursor:'pointer',fontFamily:'Tajawal,sans-serif',fontSize:12,fontWeight:600}}>{opt}</button>
                    ))}
                  </div>
                )}
                {i<arr.length-1&&<div style={{height:1,background:'var(--border)',margin:'0 14px'}}/>}
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:9}}>
            <button onClick={onClose} style={{flex:.4,padding:'13px',background:'var(--bg2)',color:'var(--muted)',border:'1px solid var(--border)',borderRadius:13,fontFamily:'Tajawal,sans-serif',fontWeight:600,fontSize:13,cursor:'pointer'}}>إلغاء</button>
            <button onClick={()=>setStage('done')} style={{flex:1,padding:'13px',background:'var(--green)',color:'#fff',border:'none',borderRadius:13,fontFamily:'Tajawal,sans-serif',fontWeight:800,fontSize:14,cursor:'pointer'}}>✓ تأكيد وحفظ</button>
          </div>
        </>}
        {stage==='done'&&(
          <div style={{textAlign:'center',padding:'8px 0 20px'}}>
            <div style={{width:64,height:64,background:'var(--green3)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',animation:'pop .4s ease both',fontSize:30}}>✅</div>
            <p style={{fontWeight:800,fontSize:18,color:'var(--ink)',marginBottom:6}}>تم الحفظ!</p>
            <p style={{fontSize:13,color:'var(--muted)',marginBottom:20}}>حُفظت في <strong style={{color:'var(--green2)'}}>{fields.room}</strong></p>
            <button onClick={onClose} style={{padding:'12px 36px',background:'var(--green)',color:'#fff',border:'none',borderRadius:13,fontFamily:'Tajawal,sans-serif',fontWeight:700,fontSize:14,cursor:'pointer'}}>تم</button>
          </div>
        )}
      </div>
    </div>
  );
}

function RoomDetail({room,onBack}){
  const[tab,setTab]=useState('specs');
  const[toggles,setToggles]=useState({});
  const data=ROOMS_DATA[room.id];
  const toggle=i=>setToggles(t=>({...t,[i]:!t[i]}));
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg)',animation:'fadeUp .25s ease both'}}>
      <SBar light/>
      <div style={{background:'linear-gradient(160deg,var(--green) 0%,var(--green2) 100%)',padding:'4px 18px 20px',flexShrink:0}}>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:4,background:'none',border:'none',color:'rgba(255,255,255,.75)',fontSize:13,fontWeight:600,cursor:'pointer',marginBottom:14,fontFamily:'Tajawal,sans-serif'}}>
          ‹ رجوع
        </button>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:48,height:48,background:'rgba(255,255,255,.15)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26}}>{room.emoji}</div>
          <div>
            <p style={{fontWeight:800,fontSize:17,color:'#fff'}}>{data.label}</p>
            <p style={{fontSize:11,color:'rgba(255,255,255,.6)',marginTop:2}}>{data.specs.length} مواصفة · {data.devices.length} جهاز</p>
          </div>
        </div>
      </div>
      <div style={{display:'flex',background:'var(--bg)',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        {[['specs','المواصفات'],['devices','الأجهزة والضمانات']].map(([id,lbl])=>(
          <div key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'13px 8px',textAlign:'center',fontWeight:700,fontSize:13,cursor:'pointer',color:tab===id?'var(--green2)':'var(--muted)',borderBottom:tab===id?'2px solid var(--green2)':'2px solid transparent',transition:'all .2s'}}>
            {lbl}
          </div>
        ))}
      </div>
      <div className="scroll" style={{flex:1,padding:'14px',paddingBottom:20}}>
        {tab==='specs'&&(
          <div style={{background:'var(--bg)',borderRadius:16,overflow:'hidden',border:'1px solid var(--border)'}}>
            {data.specs.map((s,i,arr)=>(
              <div key={i}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 15px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:7,color:'var(--muted)',fontSize:13}}>
                    <span>{s.icon}</span><span>{s.label}</span>
                  </div>
                  <span style={{fontWeight:700,fontSize:13,color:'var(--ink)'}}>{s.val}</span>
                </div>
                {i<arr.length-1&&<div style={{height:1,background:'var(--border)',margin:'0 15px'}}/>}
              </div>
            ))}
          </div>
        )}
        {tab==='devices'&&(

    const t=(q||query).trim();if(!t)return;

}

function App(){
  const[screen,setScreen]=useState('home');
  const[propOpen,setPropOpen]=useState(false);
  const[selProp,setSelProp]=useState(PROPERTIES[0]);
  const render=()=>{
    switch(screen){
      case 'home':return <HomeTab onTab={setScreen} propOpen={propOpen} setPropOpen={setPropOpen} selProp={selProp} setSelProp={setSelProp}/>;
      case 'map':return <MapTab onTab={setScreen}/>;
      case 'profile':return <ProfileTab onTab={setScreen}/>;
      default:return <HomeTab onTab={setScreen} propOpen={propOpen} setPropOpen={setPropOpen} selProp={selProp} setSelProp={setSelProp}/>;
    }

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>

        <div style={{width:108,height:27,background:'#1C1C1E',borderRadius:'0 0 18px 18px',margin:'0 auto 7px',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
          <div style={{width:7,height:7,background:'#111',borderRadius:'50%'}}/>
          <div style={{width:44,height:4,background:'#111',borderRadius:4}}/>
          <div style={{width:7,height:7,background:'#111',borderRadius:'50%'}}/>
        </div>
        <div style={{background:'var(--bg)',borderRadius:40,height:716,position:'relative'}}>
          <div style={{position:'absolute',inset:0,borderRadius:40,overflow:'hidden'}}>
            {render()}
          </div>
          {screen==='home'&&propOpen&&(
            <div style={{position:'absolute',top:106,right:68,background:'var(--bg)',borderRadius:16,border:'1px solid var(--border2)',boxShadow:'0 10px 36px rgba(0,0,0,.18)',zIndex:9999,minWidth:196,overflow:'hidden',animation:'fadeUp .18s ease both'}}>
              <p style={{padding:'9px 12px 5px',fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:.5}}>عقاراتي</p>
              {PROPERTIES.map((p,i)=>(
                <div key={p.id} onClick={()=>{setSelProp(p);setPropOpen(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 13px',cursor:'pointer',background:selProp.id===p.id?'var(--bg2)':'transparent',borderBottom:i<PROPERTIES.length-1?'1px solid var(--border)':'none',transition:'background .15s'}}>
                  <div style={{width:34,height:34,background:selProp.id===p.id?'var(--green3)':'var(--bg2)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,flexShrink:0}}>{p.icon}</div>
                  <div style={{flex:1}}>
                    <p style={{fontWeight:700,fontSize:13,color:'var(--ink)'}}>{p.name}</p>
                    <p style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{p.type}</p>
                  </div>
                  {selProp.id===p.id&&(
                    <div style={{width:18,height:18,background:'var(--green)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                  )}
                </div>
              ))}
              <div style={{padding:'7px 11px'}}>
                <div style={{padding:'8px',background:'var(--bg2)',borderRadius:11,textAlign:'center',fontSize:12,color:'var(--green2)',fontWeight:700,cursor:'pointer',border:'1px solid var(--border)'}}>
                  + إضافة عقار
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
      <p style={{fontSize:11,color:'rgba(255,255,255,.15)',fontFamily:'Tajawal,sans-serif'}}>نموذج تفاعلي · وثائقي الرقمية</p>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
